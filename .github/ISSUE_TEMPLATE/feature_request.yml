name: Feature Request
description: Suggest a new animation, icon, or feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New animation
        - New icon
        - MCP tool improvement
        - Website feature
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      placeholder: Why is this needed? What problem does it solve?
