name: Bug Report
description: Report a bug with Animotion animations, icons, website, or MCP server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Website / UI
        - Animation not working
        - MCP Server
        - Icons
        - PNG Animator
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 130 / macOS 15"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      placeholder: Paste screenshots if applicable
